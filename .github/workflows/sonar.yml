name: SonarCloud
on:
  push:
    branches:
      - main
      - master
      - feature/*
      - fix/*
      - sonarcloud
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install sonar-scanner and build-wrapper
        uses: SonarSource/sonarcloud-github-c-cpp@v1
      - name: Install dependencies
        run: |
          sudo apt-get upgrade -y
          sudo apt-get update -y
          sudo apt list postgresql
          sudo apt-get install -y \
          bison flex \
          postgresql postgresql-contrib postgresql-server-dev-14 libpq-dev postgresql-client \
          build-essential autoconf libtool libcunit1-dev \
          libproj-dev libgdal-dev libgeos-dev libjson-c-dev libsfcgal-dev \
          libprotobuf-c1 libprotobuf-c-dev protobuf-c-compiler
          whereis pg_config
      - name: Run build-wrapper
        run: |
          ./autogen.sh
          ./configure \
              --with-pgconfig=/usr/bin/pg_config \
              --with-geosconfig=/usr/bin/geos-config \
              --with-gdalconfig=/usr/bin/gdal-config \
              --with-sfcgal \
              --without-interrupt-tests \
              --with-library-minor-version
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} make clean all
      - name: Run sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner --define sonar.cfamily.build-wrapper-output="${{ env.BUILD_WRAPPER_OUT_DIR }}"

